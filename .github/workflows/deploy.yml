name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: quartz/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('quartz/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: quartz/.quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install dependencies
        run: cd quartz && npm ci

      - name: Install Quartz plugins
        run: cd quartz && npx quartz plugin install

      - name: Apply folder-page sort patch (ascending date)
        run: |
          TARGET="quartz/.quartz/plugins/folder-page/dist/index.js"
          if [ -f "$TARGET" ]; then
            sed -i 's/(getDate(f22)?.getTime() ?? 0) - (getDate(f1)?.getTime() ?? 0)/(getDate(f1)?.getTime() ?? 0) - (getDate(f22)?.getTime() ?? 0)/; s/return f1Title.localeCompare(f2Title);/return f2Title.localeCompare(f1Title);/' "$TARGET"
          else
            echo "WARNING: $TARGET not found"
          fi

      - name: Build Quartz site
        run: cd quartz && npx quartz build -d .. -v

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
